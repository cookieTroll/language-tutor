language: default
messages:
  interruption_banner: "\n==================================================\n          INTERRUPTED SESSION DETECTED\n==================================================\n{session_lines}\n--------------------------------------------------\nWhat would you like to do?\n  [l] Log it   - Summarize what was completed and start fresh\n  [d] Discard  - Delete the partial session and start fresh\n  [r] Resume   - (Unavailable in PoC mode)\n=================================================="
  interruption_choice_prompt: "Choice [l/d]: "
  interruption_resume_unavailable: "[!] Resume option is currently unavailable in PoC mode. Please select 'l' to log or 'd' to discard."
  interruption_invalid_choice: "[!] Invalid option '{choice}'. Please enter 'l' to log or 'd' to discard."
  session_interrupted_keyboard: "\n[!] Session interrupted. You can resume or log it next time."
  next_action_prompt_first: "\nSession complete. Start {module} practice{focus_label} now? This will begin a new session. [Y/n]: "
  next_action_prompt_other: "\nHow about {module} practice{focus_label} instead? [Y/n]: "
  confirm_level_display: "\nYour current CEFR level: {level}"
  confirm_level_prompt: "Press Enter to keep, or type a new level (A1–C2): "
  confirm_explanation_language_display: "Explanations/summaries language: {language}"
  confirm_explanation_language_prompt: "Press Enter to keep, or type a new language: "
  active_language_status: "\nCurrently studying {language}."
  active_language_switch_prompt: "Continue or switch language? [Press Enter to continue, or type new language]: "
  ask_target_language: "\nWhich language would you like to study? "
  ask_level: "Enter your CEFR level for {language} [default: {default}]: "
  ask_explanation_language_new: "Which language should explanations/summaries be written in? [default: English]: "
  recommendation_display: "\n[Recommendation]: We suggest using the '{module}' module.\nReason: {reason}{focus_line}"
  history_hint_block: " (writing-history report: /history for last 10 sessions, /history <n> e.g. /history 5 for last n sessions, /history <n>d e.g. /history 7d for last n days, add lang:<language> e.g. /history 5 lang:german to change the report's language (default: your explanation-language setting), /language <language> e.g. /language german to change your explanation-language setting itself, /progress for mastery + level progress)"
  module_choice_prompt: "\nAccept suggestion? [Y/Enter to accept, or type a module name to switch]\nAvailable modules: {available}{history_hint}\n> "
  invalid_module_fallback: "[!] Invalid module. Falling back to suggested module '{module}'."
  language_command_current: "[*] Current explanation language: {language}. Usage: /language <language>"
  language_command_no_profile: "[!] No active profile to update."
  language_command_updated: "[*] Explanation language set to {language}."
  history_invalid_arg: "[!] Invalid /history argument. Use '/history', '/history <n>' (sessions), or '/history <n>d' (days)."
  history_no_sessions: "\nNo completed writing sessions in that window yet."
  history_could_not_generate: "\n[!] Could not generate a history summary right now."
  history_report_header: "\n--- Writing History ({scope_label}) ---\n{summary}"
  level_up_prompt: "\nYou've mastered all curated grammar topics for {current_level}. Advance to {next_level}? [Y/n]: "
  level_up_confirmed: "[*] Level updated to {next_level}."
